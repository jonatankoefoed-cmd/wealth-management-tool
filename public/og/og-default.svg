<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- OpenGraph default image - clean, premium wealth management branding -->
  <rect width="1200" height="630" fill="#FFFFFF"/>
  
  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#F7F7F8"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Logo mark (centered, large) -->
  <g transform="translate(500, 200)">
    <rect x="20" y="80" width="40" height="100" rx="12" fill="#2563EB"/>
    <rect x="80" y="40" width="40" height="140" rx="12" fill="#2563EB"/>
    <rect x="140" y="0" width="40" height="180" rx="12" fill="#2563EB"/>
  </g>
  
  <!-- Wordmark -->
  <text x="600" y="460" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="500" fill="#111827">Wealth</text>
  
  <!-- Tagline -->
  <text x="600" y="510" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#6B7280">Personal Wealth Management</text>
</svg>
